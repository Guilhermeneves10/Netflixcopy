<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Quem esta assistindo</title>
    <link rel="stylesheet" href="style_pgnInicial.css">
</head>
<body>
    <header class="topo">
        <img src="banner.png" alt="Netflix" class="logo">
    </header>

    <main>
        <h1>Quem esta assistindo?</h1>

        <section class="perfiles" aria-label="Lista de perfis">
            <article class="perfile">
                <figure>
                    <img src="foto_perfil1.png" alt="Perfil Neves">
                    <figcaption>Neves</figcaption>
                </figure>
            </article>

            <article class="perfile">
                <figure>
                    <img src="foto_perfil2.png" alt="Perfil Kessia">
                    <figcaption>Kessia</figcaption>
                </figure>
            </article>

            <article class="perfile">
                <figure>
                    <img src="foto_perfil3.png" alt="Perfil Julia">
                    <figcaption>Julia</figcaption>
                </figure>
            </article>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
